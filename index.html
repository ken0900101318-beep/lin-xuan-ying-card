<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林宣穎｜自我介紹</title>
<meta name="description" content="林宣穎的國小生自我介紹：活潑可愛，喜歡狐狸。">
<meta property="og:title" content="林宣穎｜自我介紹">
<meta property="og:description" content="國小生自我介紹：活潑可愛，喜歡狐狸。">
<meta property="og:image" content="assets/lin-xuan-ying.jpg">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #27304d;
    background:
      radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.72) 0 11%, transparent 24%),
      radial-gradient(circle at 86% 12%, rgba(255, 255, 255, 0.58) 0 9%, transparent 22%),
      linear-gradient(135deg, #ffc2de 0%, #f7b8dc 28%, #b6dcff 68%, #8fc8ff 100%);
    overflow-x: hidden;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    border-radius: 999px;
    pointer-events: none;
    z-index: 0;
  }

  body::before {
    width: 260px;
    height: 260px;
    left: -86px;
    bottom: 8vh;
    background: rgba(255, 255, 255, 0.23);
    box-shadow: 220px -520px 0 rgba(255, 246, 252, 0.2);
  }

  body::after {
    width: 210px;
    height: 210px;
    right: -72px;
    top: 42vh;
    background: rgba(255, 255, 255, 0.18);
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px 16px;
  }

  .card {
    width: min(100%, 430px);
    overflow: hidden;
    border: 2px solid rgba(255, 255, 255, 0.68);
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.72);
    box-shadow: 0 24px 60px rgba(66, 98, 152, 0.24);
    backdrop-filter: blur(18px);
  }

  .hero {
    position: relative;
    padding: 22px 22px 0;
  }

  .photo-frame {
    position: relative;
    overflow: hidden;
    width: 100%;
    aspect-ratio: 4 / 5;
    border: 8px solid #ffffff;
    border-radius: 24px;
    background: #f8dbea;
    box-shadow: 0 16px 32px rgba(67, 84, 132, 0.18);
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center 34%;
  }

  .name-plate {
    position: absolute;
    left: 50%;
    bottom: -24px;
    transform: translateX(-50%);
    min-width: 72%;
    padding: 14px 18px 15px;
    border: 2px solid rgba(255, 255, 255, 0.9);
    border-radius: 999px;
    text-align: center;
    color: #ffffff;
    background: linear-gradient(135deg, #ff7eb6, #7ab9ff);
    box-shadow: 0 14px 26px rgba(88, 121, 172, 0.22);
  }

  .name {
    font-size: clamp(30px, 9vw, 40px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
  }

  .subtitle {
    margin-top: 7px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .content {
    padding: 52px 24px 28px;
  }

  .intro-section {
    display: grid;
    justify-items: center;
    gap: 14px;
  }

  .intro-title {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid rgba(255, 255, 255, 0.88);
    border-radius: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: #4d628d;
    background: rgba(255, 255, 255, 0.62);
    box-shadow: 0 12px 22px rgba(54, 92, 146, 0.12);
  }

  .intro-text {
    width: 100%;
    padding: 16px 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.56);
    font-size: 17px;
    font-weight: 800;
    line-height: 1.8;
    color: #344066;
  }

  .fox {
    width: min(62vw, 210px);
    margin: 2px auto 4px;
    filter: drop-shadow(0 14px 14px rgba(116, 89, 92, 0.18));
  }

  .profile {
    display: grid;
    gap: 12px;
    margin-top: 18px;
  }

  .info-row {
    display: grid;
    grid-template-columns: 92px 1fr;
    align-items: center;
    min-height: 50px;
    padding: 12px 15px;
    border: 1px solid rgba(255, 255, 255, 0.86);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.62);
  }

  .label {
    font-size: 13px;
    font-weight: 800;
    color: #7a86a7;
  }

  .value {
    font-size: 17px;
    font-weight: 900;
    color: #26304c;
    line-height: 1.35;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  .badge {
    flex: 1 1 120px;
    padding: 12px 14px;
    border-radius: 999px;
    text-align: center;
    font-size: 15px;
    font-weight: 900;
    color: #ffffff;
    background: linear-gradient(135deg, #ff8abb, #78baff);
    box-shadow: 0 10px 18px rgba(85, 118, 172, 0.16);
  }

  @media (max-width: 380px) {
    .page {
      padding: 16px 10px;
    }

    .card {
      border-radius: 22px;
    }

    .hero {
      padding: 16px 16px 0;
    }

    .content {
      padding: 48px 16px 22px;
    }

    .info-row {
      grid-template-columns: 78px 1fr;
      padding: 11px 12px;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <article class="card" aria-label="林宣穎自我介紹">
      <section class="hero">
        <div class="photo-frame">
          <img src="assets/lin-xuan-ying.jpg" alt="林宣穎照片">
        </div>
        <div class="name-plate">
          <h1 class="name">林宣穎</h1>
          <p class="subtitle">活潑可愛的小狐狸迷</p>
        </div>
      </section>

      <section class="content">
        <div class="intro-section">
          <div class="intro-title">我的自我介紹</div>
          <p class="intro-text">大家好，我是林宣穎。我是一個活潑可愛的小學生，最喜歡狐狸。</p>
          <svg class="fox" viewBox="0 0 280 240" role="img" aria-label="可愛狐狸插圖">
            <defs>
              <linearGradient id="fox-fur" x1="58" y1="34" x2="218" y2="206" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#ffb24d"/>
                <stop offset=".58" stop-color="#f57b32"/>
                <stop offset="1" stop-color="#e9572d"/>
              </linearGradient>
              <linearGradient id="fox-tail" x1="35" y1="163" x2="128" y2="220" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#ffb24d"/>
                <stop offset="1" stop-color="#f06d31"/>
              </linearGradient>
            </defs>
            <ellipse cx="144" cy="212" rx="86" ry="16" fill="#c5d9ff" opacity=".28"/>
            <path d="M70 165c-28 0-48 16-58 43 33 4 63-2 87-18 16-11 22-27 12-35-8-6-22 10-41 10z" fill="url(#fox-tail)"/>
            <path d="M23 203c19-2 34-8 46-18 7-6 13-13 17-21 7-11 19-7 23 3 2 6 0 13-7 20-21 19-48 27-79 16z" fill="#fff7ec"/>
            <path d="M74 91c-14-39-13-66 1-75 15-9 42 20 59 57 14-5 29-5 43 0 17-37 44-66 59-57 14 9 15 36 1 75 19 21 29 46 29 72 0 55-48 90-126 90S14 218 14 163c0-26 10-51 29-72z" fill="url(#fox-fur)"/>
            <path d="M79 29c13 9 29 31 42 62L75 105C66 67 67 38 79 29zM232 29c-13 9-29 31-42 62l46 14c9-38 8-67-4-76z" fill="#dd552f"/>
            <path d="M86 50c9 9 20 26 29 46l-31 9c-6-23-7-42 2-55zM226 50c-9 9-20 26-29 46l31 9c6-23 7-42-2-55z" fill="#fff3e8"/>
            <path d="M72 150c0-36 31-65 68-65s68 29 68 65c0 42-31 71-68 71s-68-29-68-71z" fill="#fff7ec"/>
            <path d="M65 117c18-15 38-25 57-30-18 21-34 38-50 52-8 7-20-11-7-22zM215 117c-18-15-38-25-57-30 18 21 34 38 50 52 8 7 20-11 7-22z" fill="#f57b32"/>
            <circle cx="102" cy="142" r="13" fill="#2f3047"/>
            <circle cx="178" cy="142" r="13" fill="#2f3047"/>
            <circle cx="107" cy="137" r="4" fill="#ffffff"/>
            <circle cx="183" cy="137" r="4" fill="#ffffff"/>
            <ellipse cx="83" cy="165" rx="15" ry="9" fill="#ff9bb5" opacity=".58"/>
            <ellipse cx="197" cy="165" rx="15" ry="9" fill="#ff9bb5" opacity=".58"/>
            <path d="M124 162c7-7 25-7 32 0-2 12-8 18-16 18s-14-6-16-18z" fill="#3d2631"/>
            <path d="M140 178v12M140 190c-8 10-24 10-32 0M140 190c8 10 24 10 32 0" fill="none" stroke="#3d2631" stroke-width="5" stroke-linecap="round"/>
            <path d="M90 128c8-8 18-10 29-5M161 123c11-5 21-3 29 5" fill="none" stroke="#7d3d2c" stroke-width="6" stroke-linecap="round" opacity=".38"/>
            <path d="M78 208c26 22 97 22 124 0-15 31-49 45-62 45s-47-14-62-45z" fill="#fff7ec"/>
          </svg>
        </div>

        <div class="profile">
          <div class="info-row">
            <div class="label">生日</div>
            <div class="value">2017 / 2 / 10</div>
          </div>
          <div class="info-row">
            <div class="label">個性</div>
            <div class="value">活潑可愛</div>
          </div>
          <div class="info-row">
            <div class="label">喜歡</div>
            <div class="value">狐狸</div>
          </div>
        </div>

        <div class="badges">
          <div class="badge">可愛</div>
          <div class="badge">活潑</div>
          <div class="badge">狐狸控</div>
        </div>
      </section>
    </article>
  </main>
</body>
</html>
